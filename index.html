<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <title>官方答疑群</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        .qr-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .qr-code {
            width: 280px;
            height: 280px;
            margin: 0 auto;
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 10px;
            background: #fff;
        }
        .qr-code img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .hint {
            margin-top: 25px;
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        .wechat-icon {
            color: #07c160;
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
</head>
<body>
    <div class="container">
        <h1 class="qr-title">官方答疑群</h1>h1>
        <div class="qr-code">
            <img src="your-qrcode-image-url.png" alt="官方答疑群二维码">
        </div>div>
        <p class="hint">
            长按识别二维码<br>
            加入官方答疑交流群
        </p>p>
        <p class="wechat-icon">💬 微信专享</p>p>
    </div>div>

    <script>
        wx.config({
            debug: false,
            appId: 'YOUR_APP_ID',
            timestamp: '',
            nonceStr: '',
            signature: '',
            jsApiList: ['updateAppMessageShareData', 'updateTimelineShareData']
        });

        wx.ready(function() {
            wx.updateAppMessageShareData({
                title: '官方答疑群',
                desc: '扫码加入官方答疑交流群，获取专业解答',
                link: window.location.href,
                imgUrl: 'your-share-image-url.png',
                success: function() { console.log('分享成功'); }
            });

            wx.updateTimelineShareData({
                title: '官方答疑群',
                desc: '扫码加入官方答疑交流群，获取专业解答',
                link: window.location.href,
                imgUrl: 'your-share-image-url.png',
                success: function() { console.log('朋友圈分享成功'); }
            });
        });

        wx.error(function(res) {
            console.log('微信配置错误:', res);
        });
    </script>
</body>
</html>html></script></body></style></title></head>
